<app-navbar></app-navbar>

<!-- Expert List -->
<div *ngIf="!selectedExpert">
  <div class="transition-none">
    <section class="title-hero-bg" style="background-image: url(assets/images/background/parallax-bg-2.jpg);">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div class="page-title text-center white-color">
              <h1 class="raleway-font font-300">Nos Experts</h1>
              <div class="breadcrumb mt-20">
                <ul>
                  <li><a routerLink="/home">Home</a></li>
                  <li>Experts</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <section class="white-bg">
    <div class="container">
      <div class="row">
        <div class="col-md-3 mb-3 position-relative">
          <!-- Toast directly above filters -->
          <div
            *ngIf="showToast"
            class="toast show align-items-center text-bg-warning border-0 shadow"
            role="alert"
            style="position: absolute; top: -60px; left: 0; right: 0; margin: auto; min-width: 100%; opacity: 1;"
          >
            <div class="d-flex">
              <div class="toast-body">
                {{ errorMessage }}
              </div>
              <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                aria-label="Close"
                (click)="showToast = false; errorMessage = ''"
              ></button>
            </div>
          </div>

          <!-- Filters -->
          <app-expert-filters 
            [initialDomain]="currentFilters.domain"
            (filtersChanged)="applyFilters($event)">
          </app-expert-filters>
        </div>

        <div *ngIf="!isLoading && filteredExperts.length > 0" class="col-md-9 blog-style-01">

          <div
          *ngFor="let expert of experts"
          class="col-md-4 col-sm-4 col-xs-12 mb-30"
        >
          <div class="post" (click)="viewProfile(expert)" style="cursor: pointer;">
            <div class="post-img">
              <img
                class="img-responsive"
                [src]="expert.image?.imageUrl || 'assets/images/portfolio/grid/user.jpg'"
                alt="{{ expert.firstname }} {{ expert.lastname }}"
              />
            </div>
            <div class="post-info all-padding-20">
              <h3>
                <a href="javascript:void(0);">
                  {{ expert.firstname }} {{ expert.lastname }}
                </a>
              </h3>
              <h6>{{ expert.email }}</h6>
              <hr />
              <p class="mt-10">
                <span class="extras-wrap">
                  <i class="icofont icofont-briefcase"></i>
                  <span>{{ expert.domaineExpertise }}</span>
                </span>
                <span class="extras-wrap">
                  <i class="icofont icofont-star"></i>
                  <span>{{ expert.rating || 'N/A' }}/5</span>
                </span>
              </p>
              <a class="readmore">
                <span>voir profile</span>
              </a>
            </div>
          </div>
        </div>
        

      </div>

      <!-- Pagination Section -->
      <div class="row mt-50">
        <div class="col-md-12">
          <div class="text-center">
            <div class="pagination text-uppercase dark-color justify-content-center">
              <ul>
                <li>
                  <a href="javascript:void(0);" (click)="prevPage()" [class.disabled]="currentPage === 0">
                    <i class="icofont icofont-long-arrow-left mr-5 xs-display-none"></i> Précedent
                  </a>
                </li>
                <li class="active">
                  <a href="javascript:void(0);">{{ currentPage + 1 }}</a>
                </li>
                <li>
                  <a href="javascript:void(0);" (click)="nextPage()" [class.disabled]="currentPage + 1 >= totalPages">
                    Suivant <i class="icofont icofont-long-arrow-right ml-5 xs-display-none"></i>
                  </a>
                </li>
              </ul>
            </div>
            <p class="mt-3 small">Page {{ currentPage + 1 }} of {{ totalPages }}</p>
          </div>
        </div>
      </div>
    </div>
    </div>
  </section>
</div>
