<div class="row">
  <div class="col-xl-12">
    <app-card
      [customHeader]="true"
      [options]="false"
      blockClass="table-border-style"
    >
      <div class="app-card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0;">Liste des Domaines</h5>
        <button class="btn btn-primary" (click)="openAddDomaineModal()">
          <i class="fa fa-plus"></i> Ajouter domaine
        </button>
      </div>
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
          <tr>
            <th style="width: 5%;">#</th>
            <th style="width: 12%;">Image</th>
            <th style="width: 40%;">Nom</th>
            <th style="width: 20%;">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let domaine of domaines; let i = index">
            <th scope="row">{{ i + 1 }}</th>
            <td>
              <img *ngIf="domaine.imageUrl" [src]="domaine.imageUrl" alt="Image domaine" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">
            </td>
            <td>{{ domaine.name }}</td>
            <td>
              <button type="button" class="btn btn-outline-warning" (click)="openEditDomaineModal(domaine)"><i class="fa fa-edit"></i> Modifier</button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </app-card>
  </div>
</div>

<div class="pagination-container" style="display: flex; justify-content: center; align-items: center; margin-top: 1rem;">
  <button class="btn btn-outline-primary" [disabled]="currentPage === 0" (click)="onPageChange({ pageIndex: currentPage - 1, pageSize: pageSize })">
    Précédent
  </button>
  <span style="margin: 0 1rem;">
    Page {{ currentPage + 1 }} / {{ totalPages }}
  </span>
  <button class="btn btn-outline-primary" [disabled]="(currentPage + 1) * pageSize >= totalItems" (click)="onPageChange({ pageIndex: currentPage + 1, pageSize: pageSize })">
    Suivant
  </button>
</div>
