<div class="row">
  <div class="col-xl-12">
    <app-card
      cardTitle="Liste des Utilisateurs"
      [options]="false"
      blockClass="table-border-style"
    >
      <div class="table-responsive">
        <table class="table">
          <thead>
          <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Email</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let client of clients; let i = index">
            <th scope="row">{{ i + 1 }}</th>
            <td>{{ client.lastname }}</td>
            <td>{{ client.firstname }}</td>
            <td>{{ client.email }}</td>
            <td>
              <button type="button" class="btn btn-outline-info" (click)="openUserModal(client)">
                Détails
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </app-card>
  </div>
</div>

<div class="pagination-container" style="display: flex; justify-content: center; align-items: center; margin-top: 1rem;">
  <button class="btn btn-outline-primary" [disabled]="currentPage === 0" (click)="onPageChange({ pageIndex: currentPage - 1, pageSize: pageSize })">
    Précédent
  </button>
  <span style="margin: 0 1rem;">
    Page {{ currentPage + 1 }} / {{ totalPages }}
  </span>
  <button class="btn btn-outline-primary" [disabled]="(currentPage + 1) * pageSize >= totalItems" (click)="onPageChange({ pageIndex: currentPage + 1, pageSize: pageSize })">
    Suivant
  </button>
</div>
