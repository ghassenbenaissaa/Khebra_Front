<div class="row">
    <div class="col-xl-12">
      <app-card
        cardTitle="Liste des Experts"
        [options]="false"
        blockClass="table-border-style"
      >
        <div class="table-responsive">
          <table class="table">
            <thead>
            <tr>
              <th>#</th>
              <th>Client</th>
              <th>Expert</th>
              <th>Note</th>
              <th>Date</th>
              <th>Commentaire</th>
              <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let avi of avis; let i = index">
              <th scope="row">{{ i + 1 }}</th>
              <td>{{ avi.clientFullName }}</td>
              <td>{{ avi.expertFullName }}</td>
              <td>{{ avi.rate }}</td>
              <td>{{ formatDate(avi.dateReview?.toString()) }}</td>
              <td>{{ truncateComment(avi.comment) }}</td>
              <td>
                <button type="button" class="btn btn-outline-info" (click)="openAvisDetailsModal(avi)">
                  Détails
                </button>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </app-card>
    </div>
  </div>
  
  <div class="pagination-container" style="display: flex; justify-content: center; align-items: center; margin-top: 1rem;">
    <button class="btn btn-outline-primary" [disabled]="currentPage === 0" (click)="onPageChange({ pageIndex: currentPage - 1, pageSize: pageSize })">
      Précédent
    </button>
    <span style="margin: 0 1rem;">
      Page {{ currentPage + 1 }} / {{ totalPages }}
    </span>
    <button class="btn btn-outline-primary" [disabled]="(currentPage + 1) * pageSize >= totalItems" (click)="onPageChange({ pageIndex: currentPage + 1, pageSize: pageSize })">
      Suivant
    </button>
  </div>
